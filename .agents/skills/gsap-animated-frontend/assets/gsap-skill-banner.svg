<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1">
        <animate attributeName="stop-color" values="#3b82f6;#8b5cf6;#06b6d4;#3b82f6" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1">
        <animate attributeName="stop-color" values="#8b5cf6;#06b6d4;#3b82f6;#8b5cf6" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1">
        <animate attributeName="stop-color" values="#06b6d4;#3b82f6;#8b5cf6;#06b6d4" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.8" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg-grad)" rx="16"/>
  <rect width="800" height="200" fill="none" stroke="#1e293b" stroke-width="1" rx="16"/>

  <!-- Floating particles background -->
  <circle cx="50" cy="40" r="4" fill="#3b82f6" opacity="0.3">
    <animate attributeName="cy" values="40;25;40" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="160" r="6" fill="#8b5cf6" opacity="0.2">
    <animate attributeName="cy" values="160;140;160" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="680" cy="30" r="5" fill="#22c55e" opacity="0.25">
    <animate attributeName="cy" values="30;50;30" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="150" r="3" fill="#febb02" opacity="0.3">
    <animate attributeName="cy" values="150;130;150" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="20" r="3" fill="#ef4444" opacity="0.2">
    <animate attributeName="cx" values="350;370;350" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="170" r="4" fill="#06b6d4" opacity="0.2">
    <animate attributeName="cy" values="170;155;170" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Floating shapes -->
  <rect x="30" y="100" width="12" height="12" rx="2" fill="#3b82f6" opacity="0.15" transform="rotate(20 36 106)">
    <animate attributeName="y" values="100;85;100" dur="5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="20 36 106;50 36 91;20 36 106" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="720" y="60" width="10" height="10" rx="2" fill="#febb02" opacity="0.2" transform="rotate(-15 725 65)">
    <animate attributeName="y" values="60;75;60" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="-15 725 65;15 725 80;-15 725 65" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Pulse rings -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0">
    <animate attributeName="r" values="10;40;10" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="100" r="15" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0">
    <animate attributeName="r" values="8;35;8" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- GSAP icon circle -->
  <circle cx="400" cy="60" r="28" fill="#111827" stroke="#1e293b" stroke-width="1.5"/>
  <circle cx="400" cy="60" r="28" fill="none" stroke="url(#title-grad)" stroke-width="2" stroke-dasharray="176" stroke-dashoffset="176">
    <animate attributeName="stroke-dashoffset" values="176;0" dur="2s" fill="freeze"/>
  </circle>
  <text x="400" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="bold" fill="url(#title-grad)" filter="url(#glow)">G</text>

  <!-- Main title -->
  <text x="400" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="bold" fill="url(#title-grad)" filter="url(#glow)">
    GSAP Animated Frontend
  </text>

  <!-- Subtitle -->
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">
    Claude Code Skill  ·  Python CLI  ·  20+ Recipes  ·  Full API Coverage
  </text>

  <!-- Bottom tag line -->
  <text x="400" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    ✦  Production-grade animations with structured discovery  ✦
  </text>

  <!-- Animated underline -->
  <line x1="250" y1="155" x2="550" y2="155" stroke="url(#title-grad)" stroke-width="1" opacity="0.3">
    <animate attributeName="x1" values="350;250;350" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="450;550;450" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.4;0.1" dur="4s" repeatCount="indefinite"/>
  </line>
</svg>
